
spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://database-2.cp0wy00ygwtm.eu-north-1.rds.amazonaws.com:5432/product_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate           # Flyway owns schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: ${CACHE_TYPE:redis}

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MEDIA_MAX_FILE_SIZE:10MB}
      max-request-size: ${MEDIA_MAX_REQUEST_SIZE:15MB}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI:https://cognito-idp.eu-north-1.amazonaws.com/eu-north-1_fVR3iZleW}

server:
  port: 8082
  error:
    include-message: always

aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:amcart-product-images-dev}
  cloudfront:
    domain: ${AWS_CLOUDFRONT_DOMAIN:d1examplexx.cloudfront.net}

# AWS SDK reads AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY from environment
# automatically via DefaultCredentialsProvider. Do NOT put credentials here.


cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://ac97fb30ab94b436f9f4fecbd4c99b20-346183276.eu-north-1.elb.amazonaws.com}

media:
  max-file-size-bytes: ${MEDIA_MAX_FILE_SIZE_BYTES:10485760}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

resilience4j:
  circuitbreaker:
    instances:
      s3Upload:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
  retry:
    instances:
      s3Upload:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      s3Upload:
        timeoutDuration: 10s
