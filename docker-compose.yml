services:
  postgres:
    image: postgres:16-alpine
    container_name: amcart-product-db
    environment:
      POSTGRES_DB: amcart_products
      POSTGRES_USER: amcart
      POSTGRES_PASSWORD: amcart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amcart -d amcart_products"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: amcart-product-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LocalStack emulates AWS S3 for local development (no real AWS needed)
  localstack:
    image: localstack/localstack:3.4
    container_name: amcart-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
      # Create the dev bucket on startup
      LS_LOG: WARN
    volumes:
      - ./localstack-init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
